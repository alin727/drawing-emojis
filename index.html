<body></body>
<script src="https://cdn.jsdelivr.net/gh/netizenorg/netnet-standard-library/build/nn.min.js"></script>
<script>
  let lastSpawn = 0

  function draw () {
    if (nn.mouseDown) {
      let now = Date.now()
      if (now - lastSpawn < 80) return // max ~12 ducks per second
      lastSpawn = now

      let spread = 40
      let x = nn.mouseX + nn.random(-spread, spread)
      let y = nn.mouseY + nn.random(-spread, spread)
      let hue = nn.random(360)
      nn.create('img')
        .set('src', 'duck.gif')
        .css('user-select', 'none')
        .hueRotate(hue)
        .position(x, y)
        .scale(2)
        .rotate(hue)
        .addTo('body')
    }
  }

  nn.on('mousemove', draw)
</script>
